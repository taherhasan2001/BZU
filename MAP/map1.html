function building(my_location, Mycolor, fillOpacity, borderWeight, borderColor = "blue", text = "") {
    let my_building = L.polygon(
        my_location,
        {
            "bubblingMouseEvents": false,
            "color": borderColor,
            "dashArray": null,
            "dashOffset": null,
            "fill": true,
            "fillColor": Mycolor,
            "fillOpacity": fillOpacity,
            "fillRule": "evenodd",
            "lineCap": "round",
            "lineJoin": "round",
            "noClip": false,
            "opacity": 1.0,
            "smoothFactor": 1.0,
            "stroke": true,
            "weight": borderWeight
        }
    ).addTo(my_map);

    if (text !== "") {
        // Calculate the centroid of the polygon
        let centroid = my_building.getBounds().getCenter();

        // Create a tooltip with the specified text
        let tooltip = L.tooltip({
            permanent: true, // Keep the tooltip open
            direction: 'center', // Center the tooltip over the polygon
            className: 'text-tooltip' // Custom CSS class for styling
        }).setContent(text);

        // Attach the tooltip to the centroid of the polygon
        tooltip.setLatLng(centroid);
        tooltip.addTo(my_map);
    }
    return my_building;
}
