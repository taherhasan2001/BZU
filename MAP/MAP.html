    if (element.requestFullscreen) {
        element.requestFullscreen();
    } else if (element.mozRequestFullScreen) { /* Firefox */
        element.mozRequestFullScreen();
    } else if (element.webkitRequestFullscreen) { /* Chrome, Safari & Opera */
        element.webkitRequestFullscreen();
    } else if (element.msRequestFullscreen) { /* IE/Edge */
        element.msRequestFullscreen();
    } else if (screen.orientation && screen.orientation.lock) { /* Mobile devices */
        screen.orientation.lock('landscape').then(() => {
            // Do something after the screen has been locked
        }).catch((error) => {
            console.error('Failed to enable full-screen mode:', error);
        });
    } else {
        console.error('Fullscreen API is not supported.');
    }
}

function swapImageRight(event, obj_key) {
    const Images = markerPoints[obj_key]["imgs"];
    const my_length = Images.length;
    const img_id = obj_key;
    let counter = markerPoints[obj_key]["counter"];
    
    // Prevent the default context menu on right-click
    event.preventDefault();

    // Increment the counter and update the image source
    counter = (counter + 1) % my_length;
    markerPoints[obj_key]["counter"] = counter;
    $("#" + img_id).attr("src", "./IMG/" + Images[counter]);

    
}
function swapImageLeft(event, obj_key) {
    const Images = markerPoints[obj_key]["imgs"];
    const my_length = Images.length;
    const img_id = obj_key;
    let counter = markerPoints[obj_key]["counter"];
    
    // Prevent the default context menu on right-click
    event.preventDefault();

    // Increment the counter and update the image source
    counter = (counter - 1 + my_length) % my_length;  // Ensure a positive result
    markerPoints[obj_key]["counter"] = counter;
    $("#" + img_id).attr("src", "./IMG/" + Images[counter]);

}

function setMarkerCamera(obj_key){
    const myColor = markerPoints[obj_key]["color"];
    const msg =  markerPoints[obj_key]["msg"];
    const img_id =  obj_key;
    const image = markerPoints[obj_key]["imgs"][0];
    const my_location = markerPoints[obj_key]["my_location"];
    const group = markerPoints[obj_key]["group"];
    const icon_text = markerPoints[obj_key]["icon"];
    let myMarker = L.marker(
        my_location, {}
    ).addTo(group);
    let icon = L.AwesomeMarkers.icon({icon: icon_text, prefix: 'fa', markerColor: myColor, iconColor: 'white'});
    myMarker.setIcon(icon);


    let popup_e0d8f99ad49228069563795e05b3f7e0 = L.popup({
        "maxWidth": 300
    });

    
    let html_da072b9278174d1dc8292a7a4fca5af8 = $(`
    <div id="my_htmlShow_ID+${obj_key}" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
            <button type="button" onclick="swapImageLeft(event,'${obj_key}')" style="border: none; background: none; cursor: pointer;">
                <i class='fas fa-angle-double-left' style='font-size:24px'></i>
            </button>

                <img id=${img_id} src="./IMG/${image}" alt="Image" style="width: 240px; height: 200px; border-radius: 8px; cursor: pointer;" onclick="toggleFullscreen(this);">
                <b>${msg}<br>
            </div>
            <button type="button" onclick="swapImageRight(event,'${obj_key}')" style="border: none; background: none; cursor: pointer;">
                <i class='fas fa-angle-double-right' style='font-size:24px'></i>
            </button>
        </div>
`)[0];



    popup_e0d8f99ad49228069563795e05b3f7e0.setContent(html_da072b9278174d1dc8292a7a4fca5af8);

    myMarker.bindPopup(popup_e0d8f99ad49228069563795e05b3f7e0);

}
