<!DOCTYPE html>

<head>

    <meta property="og:description" content="يوفر موقعنا الإلكتروني مجموعة واسعة من الخدمات والموارد لمساعدتك على النجاح في مساعيك الأكاديمية." />
    <meta property="og:image" content="tag1.png" />

<body>
    <script>
        // Function to get the user's preferred language
        function getUserLanguage() {
            // You can implement language detection logic here, e.g., using navigator.language
            // For this example, let's assume 'ar' for Arabic and 'en' for English
            return navigator.language.startsWith('ar') ? 'ar' : 'en';
        }

        // Redirect the user to the appropriate page based on their language preference
        const userLanguage = getUserLanguage();
        if (userLanguage === 'ar') {
            window.location.href = 'BZU/ar.html';
        } else {
            window.location.href = 'BZU/en.html';
        }
    </script>
</body>
</html>
